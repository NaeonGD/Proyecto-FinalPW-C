<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Catálogo | Lau & Up.</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="index.html" class="logo">✦ Lau &amp; Up.</a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="catalogo.html" class="nav-link active">Catálogo</a>
            <span id="nav-auth"></span>
        </nav>
        <div class="header-actions">
            <button class="btn-icon" onclick="abrirCarrito()">
                🛒 <span class="badge" id="badge-carrito">0</span>
            </button>
            <button class="btn-icon" id="btn-user" onclick="irPerfil()">👤</button>
        </div>
    </div>
</header>

<div class="catalogo-layout">
    <aside class="sidebar">
        <h3 class="sidebar-title">Filtros</h3>
        <div class="filtro-grupo">
            <label class="filtro-label">Buscar</label>
            <input type="text" id="input-buscar" class="input-search"
                   placeholder="Nombre del producto..." oninput="filtrar()"/>
        </div>
        <div class="filtro-grupo">
            <label class="filtro-label">Categoría</label>
            <div id="filtro-categorias">
                <label class="radio-label">
                    <input type="radio" name="cat" value="" checked onchange="filtrar()"/> Todas
                </label>
            </div>
        </div>
        <div class="filtro-grupo">
            <label class="filtro-label">Ordenar por</label>
            <select id="select-orden" class="select-orden" onchange="filtrar()">
                <option value="">Relevancia</option>
                <option value="precio-asc">Precio: menor a mayor</option>
                <option value="precio-desc">Precio: mayor a menor</option>
                <option value="nombre">Nombre A-Z</option>
            </select>
        </div>
    </aside>

    <main class="catalogo-main">
        <p id="resultado-count" class="resultado-count">Cargando productos...</p>
        <div class="productos-grid" id="productos-catalogo"></div>
    </main>
</div>

<div class="overlay" id="overlay" onclick="cerrarCarrito()"></div>
<aside class="carrito-panel" id="carrito-panel">
    <div class="carrito-header">
        <h3>Tu carrito</h3>
        <button onclick="cerrarCarrito()" class="btn-cerrar">✕</button>
    </div>
    <div class="carrito-items" id="carrito-items"></div>
    <div class="carrito-footer">
        <div class="carrito-total">
            <span>Total</span>
            <strong id="carrito-total-val">$0</strong>
        </div>
        <button class="btn-primary w100" onclick="checkout()">Proceder al pago</button>
    </div>
</aside>

<div class="modal-overlay" id="modal-checkout" style="display:none">
    <div class="modal">
        <h3>Confirmar pedido</h3>
        <label>Dirección de envío
            <input type="text" id="input-direccion" placeholder="Calle 12 #34-56, Neiva"/>
        </label>
        <div class="modal-actions">
            <button class="btn-outline" onclick="cerrarCheckout()">Cancelar</button>
            <button class="btn-primary" onclick="confirmarPedido()">Confirmar</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/carrito.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogo.js"></script>
</body>
</html>
