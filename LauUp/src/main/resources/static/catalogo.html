<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Catálogo | Lau & Up.</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<header class="header" role="banner">
    <div class="header-inner">
        <a href="index.html" class="logo">✦ Lau &amp; Up.</a>
        <nav class="nav">
            <a href="index.html" class="nav-link"><span data-i18n="nav.inicio">Inicio</span></a>
            <a href="catalogo.html" class="nav-link active"><span data-i18n="nav.catalogo">Catálogo</span></a>
            <span id="nav-auth"></span>
        </nav>
        <div class="header-actions">
            <div class="lang-selector">
        		<button class="lang-btn active" data-lang="es" onclick="I18N.cambiar('es')">ES</button>
       			<button class="lang-btn" data-lang="en" onclick="I18N.cambiar('en')">EN</button>
       			<button class="lang-btn" data-lang="fr" onclick="I18N.cambiar('fr')">FR</button>
    		</div>
            <button class="btn-icon" onclick="abrirCarrito()" title="Carrito">
                🛒 <span class="badge" id="badge-carrito">0</span>
            </button>
            <button class="btn-icon" id="btn-user" onclick="irPerfil()" title="Perfil">👤</button>
        </div>
    </div>
</header>

<main role="main" id="contenido-principal">
<div class="catalogo-layout">
    <aside class="sidebar">
        <h3 class="sidebar-title"><span data-i18n="filtro.titulo">Filtros</span></h3>
        <div class="filtro-grupo">
            <label class="filtro-label"><span data-i18n="filtro.buscar">Buscar</span></label>
            <input type="text" id="input-buscar" class="input-search"
                   placeholder="Nombre del producto..." oninput="filtrar()"/>
        </div>
        <div class="filtro-grupo">
            <label class="filtro-label"><span data-i18n="filtro.categoria">Categoría</span></label>
            <div id="filtro-categorias">
                <label class="radio-label">
                    <input type="radio" name="cat" value="" checked onchange="filtrar()"/><span data-i18n="filtro.todas">Todas</span>
                </label>
            </div>
        </div>
        <div class="filtro-grupo">
            <label class="filtro-label"><span data-i18n="filtro.ordenar">Ordenar por</span></label>
            <select id="select-orden" class="select-orden" onchange="filtrar()">
                <option value="" data-i18n="ordenar.relevancia">Relevancia</span></option>
                <option value="precio-asc" data-i18n="ordenar.menormayor">Precio: menor a mayor</option>
                <option value="precio-desc" data-i18n="ordenar.mayormenor">Precio: mayor a menor</option>
                <option value="nombre" data-i18n="ordenar.nomalfabet">Nombre A-Z</option>
            </select>
        </div>
    </aside>

    <div class="catalogo-main">
        <p id="resultado-count" class="resultado-count"><span data-i18n="cargar.productos">Cargando productos...</span></p>
        <div class="productos-grid" id="productos-catalogo"></div>
    </div>
</div>
</main>

<footer class="footer" role="contentinfo">
    <div class="footer-inner">
        <span class="logo">✦ Lau &amp; Up.</span>
        <p data-i18n="footer.texto">© 2026 · Proyecto Programación Web · USCO</p>
    </div>
</footer>

<div class="overlay" id="overlay" onclick="cerrarCarrito()"></div>
<aside class="carrito-panel" id="carrito-panel">
    <div class="carrito-header">
        <h3><span data-i18n="carrito.titulo">Tu carrito</span></h3>
        <button onclick="cerrarCarrito()" class="btn-cerrar">✕</button>
    </div>
    <div class="carrito-items" id="carrito-items"></div>
    <div class="carrito-footer">
        <div class="carrito-total">
            <span data-i18n="carrito.total">Total</span>
            <strong id="carrito-total-val">$0</strong>
        </div>
        <button class="btn-primary w100" onclick="checkout()"><span data-i18n="carrito.pagar">Proceder al pago</span></button>
    </div>
</aside>

<div class="modal-overlay" id="modal-checkout" style="display:none">
    <div class="modal">
        <h3 ><span data-i18n="checkout.titulo">Confirmar pedido</span></h3>
        <label ><span data-i18n="checkout.direccion">Dirección de envío</span>
            <input type="text" id="input-direccion" placeholder="Calle 12 #34-56, Neiva"/>
        </label>
        <div class="modal-actions">
            <button class="btn-outline" onclick="cerrarCheckout()"><span data-i18n="checkout.cancelar">Cancelar</span></button>
            <button class="btn-primary" onclick="confirmarPedido()"><span data-i18n="checkout.confirmar">Confirmar</span></button>
        </div>
    </div>
</div>

<script src="js/i18n.js"></script> 
<script src="js/api.js"></script>
<script src="js/carrito.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogo.js"></script>
</body>
</html>
