<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Autenticando... | LauUp & Co.</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <style>
        .callback-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 1rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gris-m);
            border-top: 4px solid var(--rosa);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0%  { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <p>Autenticando con Google...</p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Leer parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const token   = params.get('token');
        const id      = params.get('id');
        const nombre  = params.get('nombre');
        const apellido = params.get('apellido');
        const email   = params.get('email');
        const rol     = params.get('rol');

        if (token) {
            // Guardar en localStorage igual que el login normal
            const userData = {
                id: parseInt(id),
                nombre,
                apellido,
                email,
                rol,
                token
            };
            localStorage.setItem('belleza_user', JSON.stringify(userData));
            // Redirigir al inicio
            window.location.href = 'index.html';
        } else {
            // Si no hay token, redirigir al login
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
