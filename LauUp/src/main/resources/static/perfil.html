<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mi Perfil | Lau & Up.</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<a href="#contenido-principal" class="skip-link">Saltar al contenido</a>

<header class="header" role="banner">
    <div class="header-inner">
        <a href="index.html" class="logo">✦ Lau &amp; Up.</a>
        <nav class="nav">
            <a href="index.html" class="nav-link" data-i18n="nav.inicio">Inicio</a>
            <a href="catalogo.html" class="nav-link" data-i18n="nav.catalogo">Catálogo</a>
        </nav>
        <div class="header-actions">
        <div class="lang-selector">
        		<button class="lang-btn active" data-lang="es" onclick="I18N.cambiar('es')">ES</button>
       			<button class="lang-btn" data-lang="en" onclick="I18N.cambiar('en')">EN</button>
       			<button class="lang-btn" data-lang="fr" onclick="I18N.cambiar('fr')">FR</button>
    		</div>
            <button class="btn-icon" onclick="window.location='catalogo.html'" aria-label="Ir al catálogo">🛒</button>
        </div>
    </div>
</header>

<main role="main" id="contenido-principal">
<div class="perfil-layout">
    <aside class="perfil-sidebar" role="complementary" aria-label="Menú de perfil">
        <div class="perfil-avatar" aria-hidden="true">👤</div>
        <h3 id="perfil-nombre">Cargando...</h3>
        <p id="perfil-email" class="text-muted"></p>
        <nav class="perfil-nav" aria-label="Navegación del perfil">
            <a href="#" class="perfil-link active" aria-current="page" onclick="mostrarSeccion('datos')" data-i18n="perfil.titulo">Mi perfil</a>
            <a href="#" class="perfil-link" aria-current="page" onclick="mostrarSeccion('pedidos')" data-i18n="perfil.pedidos">Mis pedidos</a>
            <a href="#" class="perfil-link peligro" aria-current="page" onclick="cerrarSesion()" data-i18n="perfil.cerrar">Cerrar sesión</a>
        </nav>
    </aside>

    <div class="perfil-main">
        <!-- Datos personales -->
        <section id="sec-datos" class="perfil-seccion" aria-labelledby="titulo-datos">
            <h2 class="section-title" style="text-align:left" data-i18n="perfil.titulo">Mis datos</h2>
            <div id="datos-ok" class="alert-success" style="display:none">
                Datos guardados correctamente.
            </div>
            <div class="form-row">
                <label class="form-label"><span data-i18n="reg.nombre">Nombre</span>
                    <input type="text" id="p-nombre" class="form-input"/>
                </label>
                <label class="form-label"><span data-i18n="reg.apellido">Apellido</span>
                    <input type="text" id="p-apellido" class="form-input"/>
                </label>
            </div>
            <label class="form-label"><span data-i18n="login.email">Correo (no editable)</span>
                <input type="email" id="p-email" class="form-input" disabled/>
            </label>
            <label class="form-label"><span data-i18n="reg.telefono">Teléfono</span>
                <input type="tel" id="p-tel" class="form-input"/>
            </label>
            <label class="form-label"><span data-i18n="perfil.direccion">Dirección</span>
                <input type="text" id="p-dir" class="form-input"/>
            </label>
            <button class="btn-primary" onclick="guardarPerfil()"><span data-i18n="perfil.guardar">Guardar cambios</span></button>
        </section>

        <!-- Pedidos -->
        <section id="sec-pedidos" class="perfil-seccion" style="display:none" aria-labelledby="titulo-pedidos">
            <h2 class="section-title" style="text-align:left" data-i18n="perfil.pedidos">Mis pedidos</h2>
            <div id="lista-pedidos">
                <p class="text-muted" >Cargando pedidos...</p>
            </div>
        </section>
    </div>
</div>
</main>

<footer class="footer" role="contentinfo">
    <div class="footer-inner">
        <span class="logo">✦ Lau &amp; Up.</span>
        <p data-i18n="footer.texto">© 2026 · Proyecto Programación Web · USCO</p>
    </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    const usuario = authActual();
    if (!usuario) window.location.href = 'login.html';

    document.getElementById('perfil-nombre').textContent = usuario.nombre + ' ' + usuario.apellido;
    document.getElementById('perfil-email').textContent  = usuario.email;
    document.getElementById('p-nombre').value   = usuario.nombre    || '';
    document.getElementById('p-apellido').value = usuario.apellido  || '';
    document.getElementById('p-email').value    = usuario.email     || '';
    document.getElementById('p-tel').value      = usuario.telefono  || '';
    document.getElementById('p-dir').value      = usuario.direccion || '';

    function mostrarSeccion(sec) {
    	document.querySelectorAll('.perfil-seccion').forEach(s => {
            s.style.display = 'none';
            s.setAttribute('aria-hidden', 'true');
        });
        document.querySelectorAll('.perfil-link').forEach(l => {
            l.classList.remove('active');
            l.removeAttribute('aria-current');
        });
        const seccion = document.getElementById('sec-' + sec);
        seccion.style.display = 'block';
        seccion.setAttribute('aria-hidden', 'false');
        
        const link = document.querySelector(`.perfil-link[onclick="mostrarSeccion('${sec}')"]`);
        if (link) { 
            link.classList.add('active');
            link.setAttribute('aria-current', 'page');
        }
        if (sec === 'pedidos') cargarPedidos();
    }

    async function guardarPerfil() {
        const datos = {
            nombre:    document.getElementById('p-nombre').value.trim(),
            apellido:  document.getElementById('p-apellido').value.trim(),
            telefono:  document.getElementById('p-tel').value.trim(),
            direccion: document.getElementById('p-dir').value.trim()
        };
        const res = await API.put('/api/usuarios/' + usuario.id, datos);
        if (!res.error) {
            guardarAuth({...usuario, ...res});
            document.getElementById('datos-ok').style.display = 'block';
            setTimeout(() => document.getElementById('datos-ok').style.display = 'none', 3000);
        }
    }

    async function cargarPedidos() {
        const contenedor = document.getElementById('lista-pedidos');
        const pedidos = await API.get('/api/pedidos/usuario/' + usuario.id);
        if (!pedidos.length) {
        	contenedor.innerHTML = `<p class="text-muted">${I18N.get('js.aun.no.pedidos')}</p>`;
            return;
        }
        contenedor.innerHTML = pedidos.map(p => {
            // Calcular si han pasado menos de 60 minutos
            const creado    = new Date(p.creadoEn);
            const ahora     = new Date();
            const minutos   = (ahora - creado) / 1000 / 60;
            const puedeCancelar = p.estado === 'PENDIENTE' && minutos < 60;

            return `
                <div class="pedido-card">
                    <div class="pedido-header">
                        <span><strong>Pedido #${p.id}</strong></span>
                        <span class="badge-estado estado-${p.estado.toLowerCase()}">${p.estado}</span>
                    </div>
                    <p class="text-muted">${new Date(p.creadoEn).toLocaleDateString('es-CO', {dateStyle:'long'})}</p>
                    <div class="pedido-items">
                        ${p.detalles.map(d => `
                            <div class="pedido-item">
                                <span>${d.producto.nombre} x${d.cantidad}</span>
                                <span>${formatPrecio(d.precioUnit * d.cantidad)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="pedido-footer-row">
                        <strong>Total: ${formatPrecio(p.total)}</strong>
                        ${puedeCancelar ? `
                            <button class="btn-cancelar" onclick="cancelarPedido(${p.id})">
                                Cancelar pedido
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function cancelarPedido(id) {
        if (!confirm(I18N.get('js.confirmarCancelar'))) return;
        try {
            const res = await fetch('http://localhost:8080/api/pedidos/' + id + '/cancelar', {
                method: 'PATCH'
            });
            const data = await res.json();
            if (data.error) {
                alert(data.error);
                return;
            }
            cargarPedidos(); // Recargar la lista
        } catch (e) {
            alert('Error al cancelar el pedido.');
        }
    }

    function formatPrecio(n) {
        return new Intl.NumberFormat('es-CO', {
            style: 'currency', currency: 'COP', minimumFractionDigits: 0
        }).format(n);
    }

    function cerrarSesion() {
        localStorage.removeItem('belleza_user');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
