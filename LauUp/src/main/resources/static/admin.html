<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin | Lau & Up.</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<a href="#contenido-principal" class="skip-link">Saltar al contenido</a>

<header class="header" role="banner">
    <div class="header-inner">
        <a href="index.html" class="logo">✦ Lau &amp; Up. <span class="admin-tag">ADMIN</span></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Ver tienda</a>
        </nav>
        <div class="header-actions">
            <div class="lang-selector">
        		<button class="lang-btn active" data-lang="es" onclick="I18N.cambiar('es')">ES</button>
       			<button class="lang-btn" data-lang="en" onclick="I18N.cambiar('en')">EN</button>
       			<button class="lang-btn" data-lang="fr" onclick="I18N.cambiar('fr')">FR</button>
    		</div>
            <button class="btn-outline" onclick="cerrarSesion()"><span data-i18n="perfil.cerrar">Cerrar sesión</span></button>
        </div>
    </div>
</header>

<main role="main" id="contenido-principal">
<div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar" role="complementary" aria-label="Menú de administración">
        <nav class="admin-nav" aria-label="Navegación del administrador">
            <a href="#" class="admin-link active" aria-current="page" onclick="mostrarSeccion('productos')" data-i18n="admin.productos">📦 Productos</a>
            <a href="#" class="admin-link" aria-current="page" onclick="mostrarSeccion('pedidos')" data-i18n="admin.pedidos">📋 Pedidos</a>
            <a href="#" class="admin-link" aria-current="page" onclick="mostrarSeccion('categorias')" data-i18n="admin.categorias">🏷️ Categorías</a>
        </nav>
    </aside>

    <main class="admin-main">

        <!-- ── PRODUCTOS ── -->
        <section id="sec-productos" class="admin-seccion" aria-labelledby="titulo-productos">
            <div class="admin-sec-header">
                <h2 id="titulo-productos"><span data-i18n="admin.gestionProductos">Gestión de Productos</span></h2>
                <button class="btn-primary" onclick="abrirModalProducto()"><span data-i18n="admin.nuevoProducto">+ Nuevo producto</span></button>
            </div>
            <div class="tabla-wrap">
                <table class="admin-tabla" role="table" aria-label="Lista de productos">
                    <thead>
                        <tr>
                        	<th>ID</th>
                            <th ><span data-i18n="admin.nombre">Nombre</span></th>
							<th ><span data-i18n="admin.categoria">Categoría</span></th>
							<th ><span data-i18n="admin.precio">Precio</span></th>
							<th ><span data-i18n="admin.stock">Stock</span></th>
							<th ><span data-i18n="admin.acciones">Acciones</span></th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos"></tbody>
                </table>
            </div>
        </section>

        <!-- ── PEDIDOS ── -->
        <section id="sec-pedidos" class="admin-seccion" style="display:none" aria-labelledby="titulo-pedidos">
            <div class="admin-sec-header">
                <h2 id="titulo-pedidos"><span data-i18n="admin.gestionPedidos">Gestión de Pedidos</span></h2>
            </div>
            <div class="tabla-wrap">
                <table class="admin-tabla" role="table" aria-label="Lista de pedidos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th ><span data-i18n="admin.usuario">Usuario</span></th>
                            <th ><span data-i18n="admin.total">Total</span></th>
                            <th ><span data-i18n="admin.estado">Estado</span></th>
                            <th ><span data-i18n="admin.fecha">Fecha</span></th>
                            <th ><span data-i18n="admin.cambiarEstado">Cambiar estado</span></th>
                        </tr>
                    </thead>
                    <tbody id="tabla-pedidos"></tbody>
                </table>
            </div>
        </section>

        <!-- ── CATEGORIAS ── -->
        <section id="sec-categorias" class="admin-seccion" style="display:none" aria-labelledby="titulo-categorias">
            <div class="admin-sec-header">
                <h2 id="titulo-categorias"><span data-i18n="admin.gestionCategorias">Gestión de Categorías</span></h2>
                <button class="btn-primary" onclick="abrirModalCategoria()"><span data-i18n="admin.nuevaCategoria">+ Nueva categoría</span></button>
            </div>
            <div class="tabla-wrap">
                <table class="admin-tabla" role="table" aria-label="Lista de categorías">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th ><span data-i18n="admin.nombre">Nombre</span></th>
                            <th ><span data-i18n="admin.descripcion">Descripción</span></th>
                        </tr>
                    </thead>
                    <tbody id="tabla-categorias"></tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<!-- Modal producto -->
<div class="modal-overlay" id="modal-producto" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal modal-grande">
        <h3 id="modal-titulo">Nuevo producto</h3>
        <input type="hidden" id="prod-id"/>
        <div class="form-row">
            <label class="form-label"><span data-i18n="admin.nombre">Nombre</span>
                <input type="text" id="prod-nombre" class="form-input"/>
            </label>
            <label class="form-label"><span data-i18n="admin.precio">Precio (COP)</span>
                <input type="number" id="prod-precio" class="form-input"/>
            </label>
        </div>
        <div class="form-row">
            <label class="form-label"><span data-i18n="admin.stock">Stock</span>
                <input type="number" id="prod-stock" class="form-input"/>
            </label>
            <label class="form-label"><span data-i18n="admin.categoria">Categoría</span>
                <select id="prod-categoria" class="form-input"></select>
            </label>
        </div>
        <label class="form-label"><span data-i18n="admin.descripcion">Descripción</span>
            <textarea id="prod-descripcion" class="form-input" rows="3"></textarea>
        </label>
        <label class="form-label"><span data-i18n="admin.imagen">URL de imagen (opcional)</span> <!-- no tengo imagenes en img, entonces lo coloco opcional por ahora-->
            <input type="text" id="prod-imagen" class="form-input" placeholder="https://..."/>
        </label>
        <div class="modal-actions">
            <button class="btn-outline" onclick="cerrarModalProducto()"><span data-i18n="checkout.cancelar">Cancelar</span></button>
            <button class="btn-primary" onclick="guardarProducto()"><span data-i18n="perfil.guardar">Guardar</span></button>
        </div>
    </div>
</div>

<!-- Modal categoría -->
<div class="modal-overlay" id="modal-categoria" style="display:none" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-cat">
    <div class="modal">
        <h3 id="titulo-modal-cat">Nueva categoría</h3>
        <label class="form-label"><span data-i18n="admin.nombre">Nombre</span>
            <input type="text" id="cat-nombre" class="form-input"/>
        </label>
        <label class="form-label"><span data-i18n="admin.descripcion">Descripción</span>
            <input type="text" id="cat-descripcion" class="form-input"/>
        </label>
        <div class="modal-actions">
            <button class="btn-outline" onclick="cerrarModalCategoria()">Cancelar</button>
            <button class="btn-primary" onclick="guardarCategoria()">Guardar</button>
        </div>
    </div>
</div>
</main>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
